spring.application.name=ecc-endpoint-smoke-service
server.port=${ECC_ENDPOINT_SMOKE_SERVICE_PORT:8082}

observation.metric-flush.project-id=local-ecc-endpoint-smoke-project-id
observation.metric-flush.application-name=ecc-endpoint-smoke-service
observation.metric-flush.environment=local-ecc-endpoint-smoke
observation.metric-flush.instance=${ECC_ENDPOINT_SMOKE_INSTANCE:ecc-endpoint-smoke-local-1}
observation.metric-flush.portal-base-url=${OBSERVATION_PORTAL_BASE_URL:http://localhost:8080}
observation.metric-flush.project-key=${ECC_ENDPOINT_SMOKE_PROJECT_KEY}
observation.metric-flush.timeout-millis=1000

observation.heartbeat.portal-base-url=${OBSERVATION_PORTAL_BASE_URL:http://localhost:8080}
observation.heartbeat.project-key=${ECC_ENDPOINT_SMOKE_PROJECT_KEY}
observation.heartbeat.interval-seconds=30
observation.heartbeat.timeout-millis=1000
