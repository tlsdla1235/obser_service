execution_principles:
  - id: no_source_of_truth_redefinition
    principle: "Source of Truth를 재정의하지 않는다."
    implication: "작업 범위는 확정된 Source of Truth를 구현 순서, dependency, gate, rollback 단위로 옮기는 것이다."
  - id: preserve_completed_stories
    principle: "완료 story를 직접 수정하지 않는다."
    implication: "Epic 4/5/6/10의 done story는 당시 구현 이력으로 보존하고, 새 alignment story에서 Aligns/Supersedes/Hardens로 참조한다."
  - id: track_as_alignment_epic
    principle: "새 alignment epic/story로 추적한다."
    implication: "Epic 13 alignment story는 공식 sprint-status.yaml에서 추적했고, P10/D3까지 완료 상태로 정렬했다."
  - id: contract_guard_before_production_code
    principle: "production code 수정 전 contract guard를 먼저 둔다."
    implication: "UI adapter/type/fixture guard로 server-computed state, order, source semantics 보존을 먼저 고정한다."
  - id: vertical_slice_execution
    principle: "backend/frontend를 한 번에 줄세우지 않고 vertical slice별로 진행한다."
    implication: "Application live, snapshot history/detail, instance live/snapshot, retention을 각각 gate와 rollback 가능한 단위로 나눈다."
  - id: staged_documentation_alignment
    principle: "문서 정렬은 별도 phase로 추적하고 just-in-time으로 수행한다."
    implication: "D2는 완료된 vertical slice 구현 결과와 문서 표현을 맞추는 범위로 제한하고, Source of Truth 의미와 완료 story 구현 이력은 바꾸지 않는다."

