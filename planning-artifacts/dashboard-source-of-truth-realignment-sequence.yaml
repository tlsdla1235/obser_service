context_sequence_risk_assessment:
  question: "이런 식으로 한 컨텍스트에서 작업순서를 정의하는 게 위험한가?"
  answer: "초기에는 공식 sprint-status.yaml을 바로 바꾸지 않고 draft sequence로 dependency, gate, rollback을 검토하는 방식이 안전했다. 현재는 Epic 13이 공식 sprint-status.yaml에 반영되어 있으므로 이 문서는 완료된 P1-P10/D2/D3 상태와 13.11 browser-smoke evidence gap을 mirror한다."
  risk_level: "low when mirroring official status and preserving Source of Truth meaning"
  safe_when:
    - "공식 sprint-status.yaml의 실제 완료/리뷰 상태만 mirror한다."
    - "완료 story 상태를 되돌리거나 덮어쓰지 않는다."
    - "각 phase의 dependency, completion gate, rollback_unit을 명시한다."
    - "문서 정렬은 D0-D3 phase로 분리하고, Source of Truth 문서는 재정의하지 않는다."
    - "P10 acceptance 이후 D3에서 final planning/status consolidation을 별도로 수행한다."
  unsafe_when:
    - "한 컨텍스트가 완료된 Epic 4/5/6/10 story 상태를 직접 바꾼다."
    - "Source of Truth 자체를 다시 정의한다."
    - "backend/frontend/cleanup을 하나의 대형 story로 묶어 rollback 단위를 잃는다."

