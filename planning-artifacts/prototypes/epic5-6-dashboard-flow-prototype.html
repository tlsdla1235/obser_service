<!doctype html>
<!--
  이 파일은 Epic 5/6 재편 전 dashboard UX flow를 판단하기 위한 standalone HTML 프로토타입이다.
  외부 backend 없이 mock read model을 표시하며, production 구현 계약이 아니라 UX 결정 보조 산출물이다.
-->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epic 5/6 Dashboard Flow Prototype</title>
  <style>
    :root {
      --canvas: #f6f7f8;
      --surface: #ffffff;
      --surface-2: #f0f3f5;
      --ink: #18212f;
      --muted: #657080;
      --quiet: #8792a1;
      --border: #d8dee6;
      --border-strong: #bdc7d3;
      --blue: #245fd0;
      --blue-soft: #eaf1ff;
      --teal: #0f766e;
      --teal-soft: #e6f5f2;
      --green: #147447;
      --green-soft: #e8f5ee;
      --amber: #b55b15;
      --amber-soft: #fff1df;
      --red: #b42318;
      --red-soft: #fdeceb;
      --slate: #3d4a5c;
      --slate-soft: #eef2f6;
      --violet: #6d42b8;
      --violet-soft: #f1ecfb;
      --shadow: 0 10px 28px rgba(24, 33, 47, 0.08);
      --radius: 8px;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--canvas);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.45;
    }

    body {
      margin: 0;
      min-width: 320px;
    }

    button,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(260px, 420px);
      gap: 14px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .brand-title {
      min-width: 0;
    }

    .brand-title strong {
      display: block;
      overflow: hidden;
      font-size: 15px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-title span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .scenario-select {
      min-width: 240px;
      max-width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
    }

    .nav-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 18px 0;
      overflow-x: auto;
      background: var(--canvas);
    }

    .nav-tab {
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid transparent;
      border-radius: 7px 7px 0 0;
      background: transparent;
      color: var(--slate);
      white-space: nowrap;
    }

    .nav-tab[aria-selected="true"] {
      border-color: var(--border);
      border-bottom-color: #fff;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      padding: 18px;
      align-items: start;
    }

    .workspace {
      min-width: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .view-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .view-title {
      min-width: 0;
    }

    .eyebrow {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.2;
    }

    h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 16px;
    }

    h3 {
      font-size: 14px;
    }

    p {
      margin: 0;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      padding: 18px 20px 20px;
    }

    .breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .breadcrumb button {
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--blue);
      font-weight: 700;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .button {
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .button.primary {
      border-color: var(--teal);
      background: var(--teal);
      color: #fff;
    }

    .button.quiet {
      border-color: var(--border);
      color: var(--muted);
      font-weight: 600;
    }

    .section {
      padding: 18px 0;
      border-top: 1px solid var(--border);
    }

    .section:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-end;
    }

    .section-head p {
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.projects {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.metrics {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .project-card,
    .metric-card,
    .triage-card,
    .event-card,
    .instance-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
    }

    .project-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 194px;
      padding: 14px;
      text-align: left;
    }

    .project-card:hover,
    .row-button:hover,
    .instance-card:hover,
    .event-card:hover {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    .project-card h2 {
      margin-bottom: 5px;
    }

    .project-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .status-line {
      display: grid;
      gap: 6px;
      margin-top: auto;
    }

    .summary-kv {
      display: grid;
      grid-template-columns: minmax(110px, 150px) minmax(0, 1fr);
      gap: 4px 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .summary-kv strong {
      color: var(--ink);
      font-weight: 700;
      min-width: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      gap: 6px;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.1;
    }

    .badge::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex: 0 0 auto;
    }

    .badge.waiting,
    .badge.unknown {
      border-color: #bad0ff;
      background: var(--blue-soft);
      color: var(--blue);
    }

    .badge.sample,
    .badge.idle {
      border-color: #d5dce5;
      background: var(--slate-soft);
      color: var(--slate);
    }

    .badge.active {
      border-color: #c7e8d8;
      background: var(--green-soft);
      color: var(--green);
    }

    .badge.degraded,
    .badge.stale,
    .badge.recovery {
      border-color: #f4cf9e;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .badge.down,
    .badge.unreachable {
      border-color: #f4b8b4;
      background: var(--red-soft);
      color: var(--red);
    }

    .badge.connection {
      border-color: #c9e8e4;
      background: var(--teal-soft);
      color: var(--teal);
    }

    .table {
      display: grid;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
    }

    .table-row {
      display: grid;
      grid-template-columns: minmax(180px, 1.4fr) minmax(90px, 0.7fr) minmax(120px, 0.8fr) minmax(150px, 1fr) minmax(160px, 1.1fr);
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      text-align: left;
    }

    .table-row:first-child {
      border-top: 0;
    }

    .table-head {
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .row-button {
      border: 0;
      background: #fff;
      color: var(--ink);
    }

    .cell-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .cell-title strong {
      overflow-wrap: anywhere;
    }

    .cell-title span,
    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .context-rail {
      display: grid;
      grid-template-columns: minmax(220px, 1.3fr) minmax(0, 2fr);
      gap: 12px;
      margin-bottom: 14px;
    }

    .rail-panel {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .rail-panel h2 {
      margin-bottom: 8px;
    }

    .strip {
      display: grid;
      grid-template-columns: minmax(190px, 0.7fr) minmax(0, 1.4fr) minmax(200px, 0.9fr);
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-left: 5px solid var(--blue);
      border-radius: var(--radius);
      background: #fff;
      align-items: center;
    }

    .strip.metric-state.degraded,
    .strip.metric-state.stale,
    .strip.metric-state.recovery {
      border-left-color: var(--amber);
    }

    .strip.metric-state.down,
    .strip.metric-state.unreachable {
      border-left-color: var(--red);
    }

    .strip.metric-state.active {
      border-left-color: var(--green);
    }

    .strip.metric-state.sample {
      border-left-color: var(--slate);
    }

    .strip + .strip {
      margin-top: 10px;
    }

    .strip-title {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .strip-copy {
      min-width: 0;
      color: var(--ink);
      font-size: 14px;
    }

    .strip-action {
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }

    .metric-card {
      min-height: 118px;
      padding: 13px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.1;
      overflow-wrap: anywhere;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
    }

    .point-list {
      display: grid;
      gap: 6px;
      margin-top: 4px;
    }

    .point-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
      border-radius: 7px;
      background: var(--surface-2);
      font-family: var(--mono);
      font-size: 12px;
    }

    .point-row span {
      overflow-wrap: anywhere;
    }

    .triage-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .triage-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      min-height: 178px;
    }

    .triage-card .rule {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }

    .triage-card .recommendation {
      padding: 10px;
      border-radius: 7px;
      background: var(--amber-soft);
      color: #6d330b;
      font-size: 13px;
    }

    .empty-state {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) minmax(220px, 0.5fr);
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
    }

    .empty-icon {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--border);
      font-weight: 900;
      color: var(--blue);
    }

    .endpoint-list,
    .instance-list,
    .event-list {
      display: grid;
      gap: 10px;
    }

    .endpoint-row {
      display: grid;
      grid-template-columns: 42px minmax(160px, 1fr) minmax(220px, 1.4fr) minmax(120px, 0.6fr);
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
    }

    .rank {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      font-size: 12px;
    }

    .route {
      font-family: var(--mono);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .mini-bars {
      display: grid;
      gap: 5px;
    }

    .bar-line {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 48px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
    }

    .bar-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #e6ebf0;
    }

    .bar-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--blue);
    }

    .bar-fill.hot {
      background: var(--amber);
    }

    .bar-fill.danger {
      background: var(--red);
    }

    .instance-card {
      display: grid;
      grid-template-columns: minmax(190px, 1.1fr) minmax(180px, 1fr) minmax(160px, 0.8fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      text-align: left;
      background: #fff;
    }

    .contribution {
      padding: 8px 10px;
      border-radius: 7px;
      background: var(--violet-soft);
      color: var(--violet);
      font-size: 12px;
      font-weight: 800;
    }

    .timeline {
      display: grid;
      gap: 10px;
      position: relative;
    }

    .event-card {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 12px;
      padding: 12px;
      text-align: left;
    }

    .event-dot {
      width: 10px;
      height: 10px;
      margin-top: 5px;
      border-radius: 50%;
      background: var(--blue);
    }

    .event-dot.warning {
      background: var(--amber);
    }

    .event-dot.danger {
      background: var(--red);
    }

    .event-dot.good {
      background: var(--green);
    }

    .snapshot-detail {
      display: grid;
      gap: 14px;
    }

    .stored-banner {
      padding: 12px;
      border: 1px solid #d7c5f0;
      border-radius: var(--radius);
      background: var(--violet-soft);
      color: #392166;
      font-size: 13px;
    }

    .contract-note {
      padding: 12px;
      border: 1px solid #bcd9f7;
      border-radius: var(--radius);
      background: var(--blue-soft);
      color: #153d85;
      font-size: 13px;
    }

    .snapshot-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .snapshot-chip {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .instance-snapshot-row {
      display: grid;
      grid-template-columns: minmax(118px, 0.7fr) minmax(150px, 0.8fr) minmax(150px, 1fr) minmax(200px, 1.1fr) minmax(160px, 0.9fr);
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      text-align: left;
    }

    .instance-snapshot-row:hover,
    .instance-snapshot-row.is-selected {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    .range-control {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
    }

    .range-control button {
      min-width: 50px;
      padding: 5px 9px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .range-control button[aria-pressed="true"] {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 3px rgba(24, 33, 47, 0.12);
    }

    .trend-lanes {
      display: grid;
      gap: 10px;
    }

    .trend-lane {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr) 120px;
      gap: 12px;
      align-items: center;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
    }

    .lane-label strong,
    .lane-label span {
      display: block;
    }

    .lane-label span,
    .lane-end {
      color: var(--muted);
      font-size: 12px;
    }

    .lane-track {
      display: grid;
      grid-template-columns: repeat(14, minmax(16px, 1fr));
      gap: 4px;
      align-items: center;
      min-height: 24px;
    }

    .lane-point {
      height: 14px;
      border-radius: 3px;
      background: var(--green);
    }

    .lane-point.waiting,
    .lane-point.unknown {
      background: var(--blue);
    }

    .lane-point.sample {
      background: var(--slate);
    }

    .lane-point.degraded,
    .lane-point.stale,
    .lane-point.recovery {
      background: var(--amber);
    }

    .lane-point.down,
    .lane-point.unreachable {
      background: var(--red);
    }

    .lane-point.quiet {
      background: #d8dee6;
    }

    .trend-sparkline {
      display: grid;
      grid-template-columns: repeat(12, minmax(10px, 1fr));
      gap: 5px;
      align-items: end;
      min-height: 56px;
      padding: 9px;
      border-radius: 7px;
      background: var(--surface-2);
    }

    .spark-bar {
      min-height: 8px;
      border-radius: 4px 4px 2px 2px;
      background: var(--teal);
    }

    .spark-bar.hot {
      background: var(--amber);
    }

    .spark-bar.danger {
      background: var(--red);
    }

    .aside {
      display: grid;
      gap: 12px;
      position: sticky;
      top: 116px;
    }

    .annotation,
    .decision-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .annotation header,
    .decision-panel header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }

    .annotation-body,
    .decision-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .annotation h3,
    .decision-panel h3 {
      font-size: 13px;
    }

    .mini-list {
      display: grid;
      gap: 7px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .mini-list li {
      position: relative;
      padding-left: 15px;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.6em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--blue);
    }

    .decision-row {
      display: grid;
      gap: 7px;
      padding: 10px 0;
      border-top: 1px solid var(--border);
    }

    .decision-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .decision-row strong {
      font-size: 12px;
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .choice {
      padding: 4px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .choice.recommended {

      background: var(--teal-soft);
      color: var(--teal);
    }

    .code {

    }

      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .divider-label::after {
      content: "";
      height: 1px;
      background: var(--border);
      flex: 1;
    }

    .nowrap {
      white-space: nowrap;
    }

    @media (max-width: 1180px) {
      .shell {
        grid-template-columns: minmax(0, 1fr);
      }

      .aside {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .grid.projects,
      .grid.metrics,
      .grid.two,
      .triage-grid,
      .context-rail,
      .aside {
        grid-template-columns: 1fr;
      }

      .strip,
      .empty-state,
      .endpoint-row,
      .instance-card,
      .instance-snapshot-row,
      .trend-lane,
      .event-card {
        grid-template-columns: 1fr;
      }

      .table {
        border: 0;
        gap: 10px;
        background: transparent;
      }

      .table-head {
        display: none;
      }

      .table-row {
        grid-template-columns: 1fr;
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
    }

    @media (max-width: 560px) {
      .topbar,
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }

      .workspace {
        border-radius: 0;
        margin-left: -12px;
        margin-right: -12px;
        border-left: 0;
        border-right: 0;
      }

      .view-header,
      .content {
        padding-left: 14px;
        padding-right: 14px;
      }

      .view-header {
        flex-direction: column;
      }

      .metric-value {
        font-size: 21px;
      }

      .scenario-select {
        width: 100%;
      }
    }

</head>

    function trendPattern(kind) {
      const tone = scenario().tone;
      const base = {
        active: ["active", "active", "active", "active", "active", "active", "active", "active", "active", "active", "active", "active", "active", tone],
        metric: ["active", "active", "active", "active", "active", "active", "active", "active", "active", "active", "active", "active", "active", tone],
        connection: ["connection", "connection", "connection", "connection", "connection", "connection", "connection", "connection", "connection", "connection", "connection", "connection", "connection", tone === "unreachable" ? "unreachable" : "connection"],
        markers: ["quiet", "quiet", "quiet", "quiet", "quiet", "quiet", "stale", "quiet", "quiet", "quiet", "quiet", "quiet", "quiet", tone]
      };
      if (tone === "degraded") {
        base.active.splice(10, 4, "active", "degraded", "degraded", "degraded");
        base.metric.splice(10, 4, "active", "degraded", "degraded", "degraded");
        base.markers.splice(10, 4, "quiet", "quiet", "degraded", "degraded");
      }
      if (tone === "stale") {
        base.metric.splice(10, 4, "active", "stale", "stale", "down");
        base.markers.splice(10, 4, "quiet", "stale", "stale", "down");
      }
      if (tone === "recovery") {
        base.metric.splice(9, 5, "stale", "down", "down", "recovery", "recovery");
        base.markers.splice(9, 5, "stale", "down", "quiet", "recovery", "recovery");
      }
      if (tone === "waiting") {
        base.active.fill("waiting");
        base.metric.fill("waiting");
        base.markers.fill("quiet");
      }
      if (tone === "sample") {
        base.active.splice(9, 5, "active", "active", "sample", "sample", "sample");
        base.metric.splice(9, 5, "active", "active", "sample", "sample", "sample");
      }
      if (tone === "unreachable") {
        base.active.splice(9, 5, "active", "active", "unreachable", "unreachable", "unreachable");
        base.metric.splice(9, 5, "active", "active", "unreachable", "unreachable", "unreachable");
        base.connection.splice(9, 5, "connection", "connection", "unreachable", "unreachable", "unreachable");
        base.markers.splice(9, 5, "quiet", "quiet", "unreachable", "unreachable", "unreachable");
      }
      return base[kind] || base.active;
    }

      if (appState.view === "instance") workspace.innerHTML = renderInstance();
      if (appState.view === "instanceSnapshots") workspace.innerHTML = renderInstanceSnapshots();
      if (appState.view === "history") workspace.innerHTML = renderHistory();
    }

    function render() {
      renderScenarioSelect();
      renderTabs();
      renderWorkspace();
      renderAnnotation();
      renderDecisions();
    }

    scenarioSelect.addEventListener("change", (event) => setScenario(event.target.value));
    document.querySelectorAll(".nav-tab").forEach((tab) => {
      tab.addEventListener("click", () => setView(tab.dataset.view));
    });

    window.setView = setView;
    window.setScenario = setScenario;
    window.selectProject = selectProject;
    window.selectApplication = selectApplication;
    window.selectInstance = selectInstance;
    window.selectSnapshot = selectSnapshot;
    window.selectInstanceSnapshot = selectInstanceSnapshot;
    window.setTrendRange = setTrendRange;

    render();
  </script>
</body>
</html>
