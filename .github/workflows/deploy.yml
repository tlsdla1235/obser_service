name: Deploy production

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/deploy.yml"
      - "build.gradle"
      - "settings.gradle"
      - "deploy/**"
      - "frontend/**"
      - "observability-portal/**"
      - "scripts/deploy/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  PORTAL_HEALTH_URL: https://portal.observstarter.cloud/internal/health/ready

jobs:
  deploy:
    name: Build immutable jar and deploy via SSM
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      OBSERVATION_DEPLOY_ARTIFACT_BUCKET: ${{ vars.OBSERVATION_DEPLOY_ARTIFACT_BUCKET }}
      OBSERVATION_PROD_DEPLOY_ROLE_ARN: ${{ vars.OBSERVATION_PROD_DEPLOY_ROLE_ARN }}
      OBSERVATION_PROD_INSTANCE_ID: ${{ vars.OBSERVATION_PROD_INSTANCE_ID }}
    steps:
      - name: Guard deploy ref
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == refs/tags/v* ]]; then
            exit 0
          fi
          echo "Production deploys must run from main or v* tags." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build portal bootJar from deploy ref
        run: ./gradlew :observability-portal:bootJar --no-daemon --stacktrace

      - name: Prepare immutable deploy artifact
        id: artifact
        run: |
          set -euo pipefail
          mkdir -p build/deploy
          portal_jar="$(find observability-portal/build/libs -maxdepth 1 -type f -name 'observability-portal-*.jar' ! -name '*-plain.jar' | sort | head -n 1)"
          test -n "${portal_jar}"
          cp "${portal_jar}" build/deploy/app.jar
          cp scripts/deploy/observation-deploy-portal.sh build/deploy/observation-deploy-portal.sh
          cp scripts/deploy/observation-rollback-portal.sh build/deploy/observation-rollback-portal.sh
          sha256="$(sha256sum build/deploy/app.jar | awk '{print $1}')"
          {
            echo "commit_sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "artifact_source=deploy-workflow-bootJar"
            echo "artifact_sha256=${sha256}"
          } > build/deploy/metadata.env
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.OBSERVATION_PROD_DEPLOY_ROLE_ARN }}

      - name: Upload immutable artifact to S3
        run: |
          set -euo pipefail
          : "${OBSERVATION_DEPLOY_ARTIFACT_BUCKET:?OBSERVATION_DEPLOY_ARTIFACT_BUCKET is required}"
          artifact_prefix="portal/${GITHUB_SHA}/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          aws s3 cp build/deploy/app.jar "s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/app.jar" --only-show-errors
          aws s3 cp build/deploy/metadata.env "s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/metadata.env" --only-show-errors
          aws s3 cp build/deploy/observation-deploy-portal.sh "s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/observation-deploy-portal.sh" --only-show-errors
          aws s3 cp build/deploy/observation-rollback-portal.sh "s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/observation-rollback-portal.sh" --only-show-errors
          {
            echo "ARTIFACT_PREFIX=${artifact_prefix}"
            echo "ARTIFACT_S3_URI=s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/app.jar"
            echo "DEPLOY_SCRIPT_S3_URI=s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/observation-deploy-portal.sh"
            echo "ROLLBACK_SCRIPT_S3_URI=s3://${OBSERVATION_DEPLOY_ARTIFACT_BUCKET}/${artifact_prefix}/observation-rollback-portal.sh"
          } >> "$GITHUB_ENV"

      - name: Deploy on EC2 via SSM Run Command
        run: |
          set -euo pipefail
          : "${OBSERVATION_PROD_INSTANCE_ID:?OBSERVATION_PROD_INSTANCE_ID is required}"
          cat > /tmp/observation-ssm-params.json <<JSON
          {
            "commands": [
              "set -euo pipefail",
              "aws s3 cp '${DEPLOY_SCRIPT_S3_URI}' /tmp/observation-deploy-portal.sh --only-show-errors",
              "aws s3 cp '${ROLLBACK_SCRIPT_S3_URI}' /tmp/observation-rollback-portal.sh --only-show-errors",
              "sudo install -o root -g root -m 0755 /tmp/observation-deploy-portal.sh /usr/local/bin/observation-deploy-portal",
              "sudo install -o root -g root -m 0755 /tmp/observation-rollback-portal.sh /usr/local/bin/observation-rollback-portal",
              "sudo ARTIFACT_S3_URI='${ARTIFACT_S3_URI}' ARTIFACT_SHA256='${{ steps.artifact.outputs.sha256 }}' DEPLOY_COMMIT_SHA='${GITHUB_SHA}' DEPLOY_SOURCE='github-actions:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}' /usr/local/bin/observation-deploy-portal"
            ]
          }
          JSON
          command_id="$(aws ssm send-command \
            --instance-ids "${OBSERVATION_PROD_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --comment "Deploy observation portal ${GITHUB_SHA}" \
            --parameters file:///tmp/observation-ssm-params.json \
            --query 'Command.CommandId' \
            --output text)"
          echo "command_id=${command_id}"
          set +e
          aws ssm wait command-executed --command-id "${command_id}" --instance-id "${OBSERVATION_PROD_INSTANCE_ID}"
          wait_status=$?
          set -e
          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${OBSERVATION_PROD_INSTANCE_ID}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
          exit "${wait_status}"

      - name: Verify external ready endpoint
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null "${PORTAL_HEALTH_URL}"; then
              exit 0
            fi
            sleep 5
          done
          exit 1
