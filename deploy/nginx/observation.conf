# Observation portal production reverse proxy.
# 80은 ACME challenge를 제외하고 HTTPS로 redirect하고, 443은 loopback portal로 proxy한다.
#
# OAuth callback code/state가 access log query string에 남지 않도록 $request_uri 대신 $uri만 기록한다.
log_format observation_no_query '$remote_addr - $remote_user [$time_local] '
                                '"$request_method $uri $server_protocol" '
                                '$status $body_bytes_sent "$http_referer" '
                                '"$http_user_agent" "$http_x_forwarded_for"';

server {
    listen 80;
    server_name portal.observstarter.cloud;
    access_log /var/log/nginx/observation_access.log observation_no_query;
    error_log /var/log/nginx/observation_error.log warn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name portal.observstarter.cloud;
    access_log /var/log/nginx/observation_access.log observation_no_query;
    error_log /var/log/nginx/observation_error.log warn;

    ssl_certificate /etc/letsencrypt/live/portal.observstarter.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.observstarter.cloud/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
