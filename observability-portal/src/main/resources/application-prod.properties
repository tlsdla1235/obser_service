# мҡҙмҳҒ profile м„Өм •мқҙлӢӨ.
#
# мқҙ нҢҢмқјм—җлҠ” мҡҙмҳҒ мӢӨк°’мқ„ л„Јм§Җ м•Ҡкі , systemd/SSM л“ұ мҷёл¶Җ мЈјмһ… к°’мқҳ placeholderл§Ң л‘”лӢӨ.
server.address=${SERVER_ADDRESS:127.0.0.1}
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

portal.auth.github.client-id=${PORTAL_AUTH_GITHUB_CLIENT_ID:}
portal.auth.github.client-secret=${PORTAL_AUTH_GITHUB_CLIENT_SECRET:}
portal.auth.github.redirect-uri=${PORTAL_AUTH_GITHUB_REDIRECT_URI:}
portal.auth.github.homepage-url=${PORTAL_AUTH_GITHUB_HOMEPAGE_URL:}

portal.auth.service-token.signing-key=${PORTAL_AUTH_SERVICE_TOKEN_SIGNING_KEY:}
portal.auth.oauth-state.signing-key=${PORTAL_AUTH_OAUTH_STATE_SIGNING_KEY:}

portal.ingest.buffer.mode=${PORTAL_INGEST_BUFFER_MODE:sqs}
portal.ingest.buffer.message-size-limit-bytes=${PORTAL_INGEST_BUFFER_MESSAGE_SIZE_LIMIT_BYTES:1048576}
portal.ingest.buffer.publisher-timeout=${PORTAL_INGEST_BUFFER_PUBLISHER_TIMEOUT:3s}
portal.ingest.buffer.sqs.queue-url=${PORTAL_INGEST_BUFFER_SQS_QUEUE_URL:}
portal.ingest.buffer.sqs.endpoint-override=${PORTAL_INGEST_BUFFER_SQS_ENDPOINT_OVERRIDE:}
portal.ingest.buffer.worker.enabled=${PORTAL_INGEST_BUFFER_WORKER_ENABLED:true}
portal.ingest.buffer.worker.dlq-url=${PORTAL_INGEST_BUFFER_WORKER_DLQ_URL:}
portal.ingest.buffer.worker.long-poll-seconds=${PORTAL_INGEST_BUFFER_WORKER_LONG_POLL_SECONDS:20}
portal.ingest.buffer.worker.max-messages-per-poll=${PORTAL_INGEST_BUFFER_WORKER_MAX_MESSAGES_PER_POLL:10}
portal.ingest.buffer.worker.visibility-timeout=${PORTAL_INGEST_BUFFER_WORKER_VISIBILITY_TIMEOUT:60s}
portal.ingest.buffer.worker.max-receive-count=${PORTAL_INGEST_BUFFER_WORKER_MAX_RECEIVE_COUNT:5}
portal.ingest.buffer.worker.max-batch-size=${PORTAL_INGEST_BUFFER_WORKER_MAX_BATCH_SIZE:10}
portal.ingest.buffer.worker.max-batch-age=${PORTAL_INGEST_BUFFER_WORKER_MAX_BATCH_AGE:2s}
