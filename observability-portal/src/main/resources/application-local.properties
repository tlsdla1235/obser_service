# 로컬 개발 profile 설정이다.
#
# 기존 local secret 파일을 local profile에서만 import해 운영 credential이 로컬 fallback과 섞이지 않게 한다.
spring.config.import=optional:file:.private/github-oauth.properties,optional:file:../.private/github-oauth.properties,optional:file:.private/smoke-seed.properties,optional:file:../.private/smoke-seed.properties
