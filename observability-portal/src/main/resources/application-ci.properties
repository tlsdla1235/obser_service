# CI profile 설정이다.
#
# GitHub Actions는 이 파일의 placeholder 이름에 맞춰 GitHub Secrets/환경변수를 주입한다.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

portal.auth.github.client-id=${PORTAL_AUTH_GITHUB_CLIENT_ID}
portal.auth.github.client-secret=${PORTAL_AUTH_GITHUB_CLIENT_SECRET}
portal.auth.github.redirect-uri=${PORTAL_AUTH_GITHUB_REDIRECT_URI}
portal.auth.github.homepage-url=${PORTAL_AUTH_GITHUB_HOMEPAGE_URL}

portal.auth.service-token.signing-key=${PORTAL_AUTH_SERVICE_TOKEN_SIGNING_KEY}
portal.auth.oauth-state.signing-key=${PORTAL_AUTH_OAUTH_STATE_SIGNING_KEY}

portal.ingest.buffer.mode=${PORTAL_INGEST_BUFFER_MODE:direct}
portal.ingest.buffer.worker.enabled=${PORTAL_INGEST_BUFFER_WORKER_ENABLED:false}
